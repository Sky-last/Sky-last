name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # jalan otomatis tiap hari
  workflow_dispatch:        # bisa jalan manual juga

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=00ffe1&color_dots[]=0d1117,0e4429,006d32,26a641,39d353
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
